<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .calculadora-container {
            background-color: white;
            border: 1px solid #007bff; /* Borde azul como en la imagen */
            padding: 30px;
            border-radius: 4px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            font-weight: normal;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .input-group input {
            width: 200px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .resultado {
            margin: 20px 0;
            font-size: 16px;
        }
        .botones button {
            padding: 8px 16px;
            margin-right: 10px;
            border: 1px solid #555;
            background-color: #f0f0f0;
            cursor: pointer;
            border-radius: 4px;
        }
        .botones button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="calculadora-container">
    <h2>Calculadora Basica</h2>

    <div class="input-group">
        <label for="num1">Numero 1:</label>
        <input type="number" id="num1" placeholder="Placeholder">
    </div>

    <div class="input-group">
        <label for="num2">Numero 2:</label>
        <input type="number" id="num2" placeholder="Placeholder">
    </div>

    <div class="resultado">
        Resultado: <span id="resultado-valor">0</span>
    </div>

    <div class="botones">
        <button onclick="calcular('suma')">Suma</button>
        <button onclick="calcular('resta')">Resta</button>
        <button onclick="calcular('multiplicacion')">Multiplicacion</button>
        <button onclick="calcular('division')">Division</button>
    </div>
</div>

<script>
    function calcular(operacion) {
        // Obtener los valores de los inputs
        const num1 = parseFloat(document.getElementById('num1').value);
        const num2 = parseFloat(document.getElementById('num2').value);
        const spanResultado = document.getElementById('resultado-valor');

        // Validar que se hayan ingresado números
        if (isNaN(num1) || isNaN(num2)) {
            spanResultado.textContent = "Error: Ingresa ambos números";
            return;
        }

        let resultado = 0;

        // Ejecutar la operación correspondiente
        switch(operacion) {
            case 'suma':
                resultado = num1 + num2;
                break;
            case 'resta':
                resultado = num1 - num2;
                break;
            case 'multiplicacion':
                resultado = num1 * num2;
                break;
            case 'division':
                if (num2 === 0) {
                    spanResultado.textContent = "Error: División por cero";
                    return;
                }
                resultado = num1 / num2;
                break;
        }

        // Mostrar el resultado
        spanResultado.textContent = resultado;
    }
</script>
</body>
</html>
